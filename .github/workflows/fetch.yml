name: Fetch Daily Data

on:
  schedule:
    - cron: '0 3 * * *'  # каждую ночь в 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests PyNaCl
      - run: python fetch.py
        env:
          CLIENT_ID_PROCARE:      ${{ secrets.CLIENT_ID_PROCARE }}
          CLIENT_SECRET_PROCARE:  ${{ secrets.CLIENT_SECRET_PROCARE }}
          REFRESH_TOKEN_PROCARE:  ${{ secrets.REFRESH_TOKEN_PROCARE }}
          GH_TOKEN:               ${{ secrets.GH_TOKEN }}
      - run: |
          git config user.name "github-actions"
          git config user.email "bot@procare"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily data $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
